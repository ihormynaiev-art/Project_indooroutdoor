name: Playwright E2E Tests with Allure Dashboard

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 7 * * *'  # Runs at 07:00 UTC (09:00 locally) every day
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Choose test suite to run'
        required: true
        default: '@regression'
        type: choice
        options:
          - '@regression'
          - '@smoke'
          - 'all'
      browser:
        description: 'Choose browser'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - 'chromium'
          - 'firefox'
          - 'webkit'
          - 'msedge'
          - 'chrome'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://dev.indooroutdoor.com/
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm install

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: |
        # Определяем параметры запуска (ручные или автоматические)
        TAG=${{ github.event.inputs.test_suite || '@regression' }}
        BROWSER=${{ github.event.inputs.browser || 'all' }}
        
        # Собираем флаги
        PROJECT_FLAG=""
        if [ "$BROWSER" != "all" ]; then PROJECT_FLAG="--project=$BROWSER"; fi
        
        GREP_FLAG=""
        if [ "$TAG" != "all" ]; then GREP_FLAG="--grep=$TAG"; fi
        
        echo "Running tests with: $PROJECT_FLAG $GREP_FLAG"
        npx playwright test $PROJECT_FLAG $GREP_FLAG
      continue-on-error: true

    - name: Load Allure History
      uses: actions/checkout@v3
      if: always()
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages-dir

    - name: Build Allure Report
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: allure-history
